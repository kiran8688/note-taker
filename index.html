<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.2);
        }
    </style>

    <title>Reimagined Note-Taker</title>
</head>
<body id="body" class="bg-[#FAFAFA] min-h-screen antialiased text-[#1A1A1A] relative selection:bg-indigo-100 selection:text-indigo-900 overflow-hidden flex items-center justify-center p-4 sm:p-8">

    <!-- Fixed Background Theme Container -->
    <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100">
    </div>

    <!-- Sidebar: Contains navigation links and user workspace branding. Uses Tailwind for a fixed sidebar layout. -->
    <aside class="w-64 h-[calc(100vh-2rem)] sm:h-[calc(100vh-3rem)] hidden md:flex flex-col bg-white/80 backdrop-blur-2xl border border-white/40 rounded-3xl shadow-2xl shrink-0 sticky top-4 sm:top-6 py-4 transition-all duration-300 ease-in-out z-20 overflow-y-auto">
        <!-- Sidebar Header with Workspace Switcher -->
        <div class="px-4 mb-6 flex items-center justify-between group cursor-pointer hover:bg-black/5 p-2 rounded-lg mx-2 transition-colors">
            <div class="flex items-center gap-2">
                <!-- User Avatar & Workspace Name -->
                <div class="w-5 h-5 bg-gradient-to-br from-gray-300 to-gray-400 shadow-inner rounded-sm flex items-center justify-center text-white text-xs font-bold ring-1 ring-black/5">K</div>
                <span class="font-semibold text-sm truncate">kiran's workspace</span>
            </div>
            <svg class="w-4 h-4 text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"></path></svg>
        </div>

    <!-- Main Central Application Window (Floating Glassmorphism) -->
    <main class="w-full max-w-5xl h-[85vh] bg-white/60 backdrop-blur-3xl border border-white/80 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden relative z-10">

        <!-- Top App Bar -->
        <header class="w-full px-8 py-5 border-b border-white/40 flex justify-between items-center bg-white/30 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-md flex items-center justify-center text-white font-bold text-sm">K</div>
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-widest leading-none">kiran's workspace</span>
                    <span class="text-sm font-semibold text-gray-800 leading-tight">Focus Board</span>
                </div>
                <button class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-gray-500 transition-all">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
                </button>
            </a>

            <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-1">Private</div>
            <a href="#" class="flex items-center gap-2 px-3 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-600 transition-colors group">
                <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Project Planning
            </a>
            <a href="#" class="flex items-center gap-2 px-3 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-600 transition-colors group">
                <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Calendar
            </a>
            <a href="#" class="flex items-center gap-2 px-3 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-600 transition-colors group">
                <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </a>
        </nav>

        <!-- Bottom Trash/Help -->
        <div class="px-4 mt-auto pt-4 border-t border-white/30 space-y-1">
            <a href="#" class="flex items-center gap-2 px-2 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-500 transition-colors">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Trash
            </a>
        </div>
    </aside>

    <!-- Main Content Area: Flex container for the primary application interface -->
    <div class="flex-1 flex flex-col h-[calc(100vh-2rem)] sm:h-[calc(100vh-3rem)] bg-white/80 backdrop-blur-2xl border border-white/40 rounded-3xl shadow-2xl w-full relative overflow-y-auto overflow-x-hidden">

        <!-- Top Navigation Bar -->
        <nav class="sticky top-0 z-30 w-full bg-white/40 backdrop-blur-2xl border-b border-[#EBEBEA]/50 px-6 py-3.5 flex items-center justify-between text-sm shadow-sm transition-all duration-300">
            <!-- Breadcrumb Navigation -->
            <div class="flex items-center gap-2.5 text-gray-500 font-medium bg-white/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-gray-100 shadow-sm">
                <span class="hover:text-gray-900 cursor-pointer transition-colors text-xs uppercase tracking-wider">kiran's workspace</span>
                <svg class="w-3.5 h-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                <span class="text-gray-900 flex items-center gap-1.5 text-sm"><span class="text-base leading-none drop-shadow-sm">📝</span> Daily Tasks</span>
            </div>

            <div class="flex gap-2">
                <button class="w-8 h-8 rounded-full bg-white/50 hover:bg-white text-gray-600 flex items-center justify-center transition-colors shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
                <button class="px-4 py-1.5 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold transition-colors shadow-md shadow-indigo-200">
                    Share
                </button>
            </div>
        </nav>

        <!-- Cover Image Section: Displays an Unsplash image with a hover-to-change button -->
        <div class="w-full h-56 sm:h-80 object-cover overflow-hidden relative group">
            <!-- Overlay gradient for better text legibility if cover text is added later -->
            <div class="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/20 z-10 pointer-events-none"></div>
            <img src="https://images.unsplash.com/photo-1588681664899-f142ff2dc9b1?q=80&w=2000" alt="Cover Image" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-1000 ease-out">
            <button class="absolute bottom-6 right-8 bg-white/80 hover:bg-white backdrop-blur-xl px-4 py-2 rounded-full text-xs font-semibold text-gray-700 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-2 group-hover:translate-y-0 shadow-lg border border-white/40 z-20 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Change cover
            </button>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto px-6 sm:px-12 py-10 flex flex-col relative">

            <!-- Document Header -->
            <div class="mb-10 w-full max-w-3xl mx-auto group">
                <div class="text-6xl mb-6 transform transition-transform hover:scale-110 origin-bottom-left w-max drop-shadow-sm cursor-pointer">✨</div>
                <h1 id="note-head" class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-gray-900 to-gray-600 tracking-tight outline-none placeholder-gray-300 empty:before:content-[attr(placeholder)]" contenteditable="true" placeholder="Untitled">Daily Tasks</h1>
                <p class="mt-3 text-gray-500 font-medium">Keep track of your most important goals for the day.</p>
            </div>

            <!-- Task Input Box -->
            <section class="w-full max-w-3xl mx-auto mb-10">
                <div class="bg-white/80 backdrop-blur-lg rounded-2xl p-2 border border-white shadow-[0_8px_30px_rgb(0,0,0,0.04)] focus-within:shadow-[0_8px_30px_rgba(79,70,229,0.15)] focus-within:border-indigo-200 transition-all duration-300">
                    <div class="flex items-center gap-3 px-3 py-2">

                        <!-- Invisible Checkbox mapped to logic -->
                        <label class="flex items-center justify-center cursor-pointer shrink-0 w-6 h-6 border-2 border-indigo-100 rounded-full hover:bg-indigo-50 transition-colors relative">
                            <input type="checkbox" id="check" class="sr-only">
                            <span class="sr-only">Mark as completed</span>
                            <svg class="w-4 h-4 text-white check-icon hidden absolute inset-0 m-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </label>

                        <input type="text" id="note-task" placeholder="What needs to be done?" maxlength="255" class="flex-1 bg-transparent border-0 text-gray-800 font-medium focus:outline-none focus:ring-0 placeholder-gray-400 text-lg">

                        <!-- Time Input styled beautifully -->
                        <div class="shrink-0 flex items-center bg-gray-50 rounded-lg px-3 py-2 border border-gray-100 hover:border-gray-300 transition-colors">
                            <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <input type="time" id="note-time" class="bg-transparent border-0 p-0 text-sm focus:outline-none focus:ring-0 text-gray-600 font-semibold cursor-pointer">
                        </div>

                        <!-- Add Button -->
                        <button id="button" type="button" class="shrink-0 w-10 h-10 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white flex items-center justify-center transition-transform hover:scale-105 active:scale-95 shadow-md shadow-indigo-200 ml-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        </button>

                    </div>
                </div>
            </section>

            <!-- Task List Container -->
            <section class="w-full max-w-3xl mx-auto flex-1">
                <div id="center-cont" class="flex flex-col gap-3">
                    <!-- Tasks injected by JS -->
                </div>
            </section>

        </div>
    </main>

    <script src="scripts/dom-ntake.js"></script>
</body>
</html>
