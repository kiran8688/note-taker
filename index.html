<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Keep grid definition separate from body to prevent layout issues with padding */

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>

    <title>Note-Taker App</title>
</head>
<body id="body" class="bg-[#FAFAFA] min-h-screen antialiased text-[#37352F] flex flex-row p-4 sm:p-6 gap-4 sm:gap-6 selection:bg-blue-100 selection:text-blue-900 relative">

    <!-- Fixed Background Theme Container -->
    <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100">
    </div>

    <!-- Sidebar: Contains navigation links and user workspace branding. Uses Tailwind for a fixed sidebar layout. -->
    <aside class="w-64 h-[calc(100vh-2rem)] sm:h-[calc(100vh-3rem)] hidden md:flex flex-col bg-white/80 backdrop-blur-2xl border border-white/60 rounded-3xl shadow-xl shrink-0 sticky top-4 sm:top-6 py-4 transition-all duration-300 ease-in-out z-20 overflow-y-auto">
        <!-- Sidebar Header with Workspace Switcher -->
        <div class="px-4 mb-6 flex items-center justify-between group cursor-pointer hover:bg-black/5 p-2 rounded-lg mx-2 transition-colors">
            <div class="flex items-center gap-2">
                <!-- User Avatar & Workspace Name -->
                <div class="w-5 h-5 bg-gradient-to-br from-gray-300 to-gray-400 shadow-inner rounded-sm flex items-center justify-center text-white text-xs font-bold ring-1 ring-black/5">K</div>
                <span class="font-semibold text-sm truncate">kiran's workspace</span>
            </div>
            <svg class="w-4 h-4 text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"></path></svg>
        </div>

        <!-- Quick Actions -->
        <div class="px-4 mb-4 space-y-1">
            <button class="w-full flex items-center gap-2 px-2 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-600 transition-colors">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                Search
                <span class="ml-auto text-[10px] text-gray-400 border border-gray-200 rounded px-1.5 py-0.5 shadow-sm bg-white">Ctrl K</span>
            </button>
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-2 space-y-0.5 overflow-y-auto">
            <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-4 mb-1">Favorites</div>
            <a href="#" class="flex items-center justify-between px-3 py-1.5 bg-white/80 backdrop-blur-md shadow-sm ring-1 ring-black/5 rounded-xl text-sm font-medium text-[#37352F] group">
                <div class="flex items-center gap-2 truncate">
                    <span class="text-base leading-none">📝</span>
                    <span class="truncate">Daily Tasks</span>
                </div>
                <button class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-gray-500 transition-all">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
                </button>
            </a>

            <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-1">Private</div>
            <a href="#" class="flex items-center gap-2 px-3 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-600 transition-colors group">
                <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Project Planning
            </a>
            <a href="#" class="flex items-center gap-2 px-3 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-600 transition-colors group">
                <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Calendar
            </a>
            <a href="#" class="flex items-center gap-2 px-3 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-600 transition-colors group">
                <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </a>
        </nav>

        <!-- Bottom Trash/Help -->
        <div class="px-4 mt-auto pt-4 border-t border-white/30 space-y-1">
            <a href="#" class="flex items-center gap-2 px-2 py-1.5 hover:bg-black/5 rounded-md text-sm font-medium text-gray-500 transition-colors">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Trash
            </a>
        </div>
    </aside>

    <!-- Main Content Area: Flex container for the primary application interface -->
    <div class="flex-1 flex flex-col h-[calc(100vh-2rem)] sm:h-[calc(100vh-3rem)] bg-white/80 backdrop-blur-2xl border border-white/60 rounded-3xl shadow-xl w-full relative overflow-y-auto overflow-x-hidden">

        <!-- Top Navigation Bar -->
        <nav class="sticky top-0 z-30 w-full bg-white/40 backdrop-blur-2xl border-b border-[#EBEBEA]/50 px-6 py-3.5 flex items-center justify-between text-sm shadow-sm transition-all duration-300">
            <!-- Breadcrumb Navigation -->
            <div class="flex items-center gap-2.5 text-gray-500 font-medium bg-white/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-gray-100 shadow-sm">
                <span class="hover:text-gray-900 cursor-pointer transition-colors text-xs uppercase tracking-wider">kiran's workspace</span>
                <svg class="w-3.5 h-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                <span class="text-gray-900 flex items-center gap-1.5 text-sm"><span class="text-base leading-none drop-shadow-sm">📝</span> Daily Tasks</span>
            </div>
            <div class="flex items-center gap-4">
                <button class="bg-white/80 hover:bg-white backdrop-blur-md border border-gray-200 text-gray-600 hover:text-gray-900 transition-colors font-medium flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full shadow-sm hover:shadow">
                    Share
                </button>
                <button class="bg-white/80 hover:bg-white backdrop-blur-md border border-gray-200 text-gray-400 hover:text-gray-800 transition-colors p-1.5 rounded-full shadow-sm hover:shadow">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
                </button>
            </div>
        </nav>

        <!-- Cover Image Section: Displays an Unsplash image with a hover-to-change button -->
        <div class="w-full h-56 sm:h-80 object-cover overflow-hidden relative group rounded-b-[2rem] sm:rounded-b-[3rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] mx-auto max-w-[98%]">
            <!-- Overlay gradient for better text legibility if cover text is added later -->
            <div class="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/20 z-10 pointer-events-none"></div>
            <img src="https://images.unsplash.com/photo-1518655048521-f130df041f66?q=80&w=2070&auto=format&fit=crop" alt="Cover Image" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-1000 ease-out">
            <button class="absolute bottom-6 right-8 bg-white/80 hover:bg-white backdrop-blur-xl px-4 py-2 rounded-full text-xs font-semibold text-gray-700 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-2 group-hover:translate-y-0 shadow-lg border border-white/40 z-20 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Change cover
            </button>
        </div>

        <!-- Page Content: Centers the main UI elements below the cover image -->
        <main class="w-full max-w-4xl mx-auto px-4 sm:px-12 md:px-24 pb-32 -mt-16 sm:-mt-24 relative z-10 flex flex-col">

            <!-- Page Icon: A large emoji icon representing the current document or workspace -->
            <div class="bg-white/90 backdrop-blur-xl shadow-xl border border-white/50 rounded-[2rem] p-4 sm:p-6 w-max mb-8 group relative cursor-pointer transform hover:-translate-y-1 transition-all duration-300">
                <div class="text-[4.5rem] sm:text-[5.5rem] leading-none drop-shadow-md">
                    📝
                </div>
                <!-- Add icon button overlay -->
                <button class="absolute -bottom-3 -right-3 bg-white border border-gray-100 shadow-lg rounded-full p-2.5 text-gray-500 hover:text-gray-800 opacity-0 group-hover:opacity-100 transition-all duration-300 transform scale-90 group-hover:scale-100 z-20 hover:bg-gray-50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>

            <!-- Header: Contains the editable document title and additional actions like 'Add comment' -->
            <header class="w-full mb-10 group pl-2">
                <h1 id="note-head" class="text-[3rem] sm:text-[3.5rem] font-bold text-[#202020] leading-tight outline-none placeholder-gray-300 empty:before:content-[attr(placeholder)] tracking-tight drop-shadow-sm" contenteditable="true" placeholder="Untitled">Daily Tasks</h1>

                <div class="flex items-center gap-4 mt-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <button class="text-gray-500 hover:text-gray-800 bg-white/50 hover:bg-white backdrop-blur-sm border border-transparent hover:border-gray-200 shadow-sm px-3 py-1.5 rounded-full transition-all text-sm font-medium flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg> Add comment
                    </button>
                </div>
            </header>

            <!-- Divider -->
            <div class="w-full h-[1px] bg-gradient-to-r from-gray-200 via-gray-100 to-transparent mb-12"></div>

            <!-- Input Section (Notion Block Style): Form for creating new tasks -->
            <section class="w-full mb-12 group relative pl-8">
                <!-- Drag handle icon (visible on hover) -->
                <div class="absolute left-0 top-5 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center gap-1 cursor-grab hover:bg-gray-100 p-1.5 rounded-lg">
                    <div class="flex gap-[3px]">
                        <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
                        <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
                    </div>
                    <div class="flex gap-[3px]">
                        <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
                        <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
                    </div>
                    <div class="flex gap-[3px]">
                        <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
                        <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
                    </div>
                </div>

                <div id="note-body" class="flex flex-col gap-4">
                    <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center bg-white/80 backdrop-blur-2xl p-4 sm:p-5 rounded-[1.5rem] sm:rounded-[2rem] border border-white/60 shadow-[0_8px_30px_rgb(0,0,0,0.06)] hover:shadow-[0_8px_40px_rgb(0,0,0,0.08)] transition-all duration-500 ring-1 ring-black/[0.03]">
                        <!-- Checkbox & Task Name -->
                        <div class="flex-1 flex items-center gap-3.5 w-full">
                            <label class="flex items-center justify-center cursor-pointer shrink-0 w-5 h-5 border-[1.5px] border-gray-300 rounded hover:bg-gray-100 transition-colors relative shadow-sm">
                                <input type="checkbox" id="check" class="sr-only">
                                <span class="sr-only">Mark as completed</span>
                                <svg class="w-3.5 h-3.5 text-white check-icon hidden absolute inset-0 m-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </label>

                            <input type="text" id="note-task" placeholder="What needs to be done?" maxlength="255"
                                class="w-full bg-transparent border-0 px-0 py-1 text-base font-medium focus:outline-none focus:ring-0 transition-colors placeholder-gray-400 text-[#37352F]">
                        </div>

                        <!-- Task Time -->
                        <div class="shrink-0 flex items-center gap-2 bg-gray-50/80 px-2 py-1.5 rounded-md border border-gray-100 group/time hover:border-gray-200 transition-colors">
                            <svg class="w-4 h-4 text-gray-400 group-hover/time:text-gray-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <input type="time" id="note-time"
                                class="bg-transparent border-0 p-0 text-sm focus:outline-none focus:ring-0 text-gray-500 font-medium cursor-pointer">
                        </div>

                        <!-- Add Button -->
                        <button id="button" type="button"
                            class="shrink-0 bg-gray-900 hover:bg-black active:bg-gray-800 text-white font-semibold py-2 px-5 rounded-xl transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-gray-200 text-sm shadow-lg hover:shadow-xl flex items-center gap-2 transform hover:-translate-y-0.5 active:translate-y-0 active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            New Task
                        </button>
                    </div>
                    <!-- Helper Text -->
                    <div class="text-xs text-gray-400 font-medium px-4 flex items-center gap-2 opacity-80">
                        <div class="p-1 bg-gray-100 rounded-md">
                            <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        Press Enter to quickly add multiple tasks.
                    </div>
                </div>
            </section>

            <!-- Tasks List Section: Container where dynamically created task cards are appended -->
            <section class="w-full pl-8 relative">
                <!-- Vertical connection line -->
                <div class="absolute left-2.5 top-0 bottom-0 w-[1px] bg-gray-200/50 -z-10"></div>
                <div id="center-cont" class="flex flex-col gap-1.5">
                    <!-- Task Cards Will Be Injected Here by scripts/dom-ntake.js -->
                </div>
            </section>

        </main>
    </div>

    <!-- End of Glassmorphic Container -->
    </div>

    <script src="scripts/dom-ntake.js"></script>
</body>
</html>
