<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* bg-gray-50 */
        }
    </style>

    <title>Note-Taker App</title>
</head>
<body id="body" class="text-gray-800 antialiased min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header -->
    <header class="w-full max-w-3xl mb-8 text-center">
        <h1 id="note-head" class="text-4xl font-extrabold text-gray-900 tracking-tight">Note-Taker</h1>
        <p class="text-gray-500 mt-2 text-sm">Organize your daily tasks beautifully.</p>
    </header>

    <main class="w-full max-w-3xl flex flex-col gap-8 w-full">

        <!-- Input Section -->
        <section class="bg-white shadow-sm border border-gray-200 rounded-xl p-6 sm:p-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800 border-b pb-2">Add Your Task</h2>

            <div id="note-body" class="flex flex-col gap-5">
                
                <div class="flex flex-col sm:flex-row gap-5">
                    <!-- Task Name -->
                    <div class="flex-1">
                        <label for="note-task" class="block text-sm font-medium text-gray-700 mb-1">Task Name</label>
                        <input type="text" id="note-task" placeholder="e.g. Design a new logo"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>

                    <!-- Task Time -->
                    <div class="flex-1">
                        <label for="note-time" class="block text-sm font-medium text-gray-700 mb-1">Time</label>
                        <input type="time" id="note-time"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <!-- Checkbox & Submit -->
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mt-2 gap-4">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="check" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900">Task completed initially?</span>
                    </label>

                    <button id="button" type="button"
                        class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-lg shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Add Task
                    </button>
                </div>
            </div>
        </section>

        <!-- Tasks List Section -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Your Tasks</h2>
            </div>
            
            <div id="center-cont" class="flex flex-col gap-3">
                <!-- Task Cards Will Be Injected Here -->
            </div>
        </section>

    </main>

    <script src="scripts/dom-ntake.js"></script>
</body>
</html>
