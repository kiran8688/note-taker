<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

    <title>Note-Taker App</title>
</head>
<body id="body" class="bg-[#FAFAFA] min-h-screen antialiased text-[#37352F] flex flex-col items-center py-12 px-4 sm:px-6">

    <!-- Main Container -->
    <main class="w-full max-w-2xl flex flex-col gap-8">

        <!-- Header -->
        <header class="w-full mt-4 mb-2">
            <h1 id="note-head" class="text-3xl font-bold text-[#37352F]">Tasks</h1>
            <p class="text-gray-400 mt-1 text-sm font-medium">Capture and organize your daily tasks.</p>
        </header>

        <!-- Input Section -->
        <section class="w-full py-2">
            <div id="note-body" class="flex flex-col gap-6">
                
                <div class="flex flex-col sm:flex-row gap-6">
                    <!-- Task Name -->
                    <div class="flex-1">
                        <label for="note-task" class="sr-only">Task Name</label>
                        <input type="text" id="note-task" placeholder="What needs to be done?"
                            class="w-full bg-transparent border-0 px-0 py-2 text-lg font-medium focus:outline-none focus:ring-0 transition-colors placeholder-gray-300">
                    </div>

                    <!-- Task Time -->
                    <div class="sm:w-32">
                        <label for="note-time" class="sr-only">Time</label>
                        <input type="time" id="note-time"
                            class="w-full bg-transparent border-0 px-0 py-2 text-sm focus:outline-none focus:ring-0 transition-colors text-gray-400">
                    </div>
                </div>

                <!-- Checkbox & Submit -->
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 pt-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="check" class="w-4 h-4 text-gray-900 border-gray-300 rounded focus:ring-gray-900 focus:ring-offset-1">
                        <span class="text-sm font-medium text-gray-400 group-hover:text-[#37352F] transition-colors">Mark as completed</span>
                    </label>

                    <button id="button" type="button"
                        class="w-full sm:w-auto bg-white border border-gray-200 hover:bg-gray-50 text-[#37352F] font-medium py-2 px-4 rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-gray-200 focus:ring-offset-1 text-sm shadow-sm">
                        Add Task
                    </button>
                </div>
            </div>
        </section>

        <!-- Tasks List Section -->
        <section class="mt-2">
            <div id="center-cont" class="flex flex-col gap-3">
                <!-- Task Cards Will Be Injected Here -->
            </div>
        </section>

    </main>

    <script src="scripts/dom-ntake.js"></script>
</body>
</html>
